# ─────────────────────────────────────────────────────────────────────────────
# Buddy Reviewer — AI-assisted MuleSoft PR Code Review
#
# Drop this file into your MuleSoft project at:
#   .github/workflows/buddy-reviewer.yml
#
# Required secrets (Settings → Secrets → Actions):
#   BUDDY_GITHUB_TOKEN   Personal Access Token with repo + pull_requests scope.
#                        Must NOT be GITHUB_TOKEN — that token cannot post
#                        review comments on PRs from forks or trigger re-runs.
#
#   At least ONE LLM key:
#   GEMINI_API_KEY       Google AI Studio key  (recommended — cheapest)
#   OPENAI_API_KEY       OpenAI key            (GPT-4o)
#   DEEPSEEK_API_KEY     DeepSeek key          (cheapest, good quality)
#
# Optional secrets / variables (Settings → Variables → Actions):
#   LLM_ANALYSIS_MODEL   Override the analysis model  e.g. gemini-2.5-pro
#   LLM_FIX_MODEL        Override the fix suggestion model
# ─────────────────────────────────────────────────────────────────────────────

name: Buddy Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Scope to file types Buddy Reviewer understands.
    # Remove this filter if you want it to run on every PR.
    paths:
      - "**.xml"
      - "**.dwl"
      - "**.dw"
      - "**.yaml"
      - "**.yml"
      - "**.properties"
      - "pom.xml"

  # Allow manual re-runs from the Actions tab (useful after updating secrets)
  workflow_dispatch:

jobs:
  buddy-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    # Don't block the PR if the review job fails — it's advisory, not a gate.
    # Change to false if you want CRITICAL issues to block merge.
    continue-on-error: true

    permissions:
      contents: read        # checkout the reviewer repo
      pull-requests: write  # post comments (only works with PAT, not GITHUB_TOKEN)

    steps:
      # ── 1. Check out the Buddy Reviewer source ────────────────────────────
      - name: Check out Buddy Reviewer
        uses: actions/checkout@v4
        with:
          repository: akii180499/mulesoft-buddy-reviewer   # ← change to your reviewer repo
          ref: main
          token: ${{ secrets.PAT_TOKEN }}
          path: buddy-reviewer

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mulesoft-buddy-reviewer/requirements.txt

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r mulesoft-buddy-reviewer/requirements.txt

      # ── 4. Run the review ─────────────────────────────────────────────────
      - name: Run Buddy Reviewer
        working-directory: buddy-reviewer
        env:
          # Repo being reviewed — GitHub injects this automatically
          GITHUB_REPOSITORY:  akii180499/integratingTeamsandSlack
          GITHUB_TOKEN:       ${{ secrets.PAT_TOKEN }}

          # LLM keys — the reviewer auto-detects whichever is set.
          # Set all three if you want fallback behaviour.
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}

        run: python main.py

      # ── 5. Surface exit code ──────────────────────────────────────────────
      # Buddy Reviewer exits with code 1 when CRITICAL issues are found.
      # Uncomment the block below to make CRITICAL issues block the PR merge.
      #
      # - name: Fail on critical issues
      #   if: failure()
      #   run: |
      #     echo "::error::Buddy Reviewer found CRITICAL issues. Merge is blocked."
      #     exit 1
